<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>print Numbers 1 to 10</h2>
    <script>
        document.write("For Loop:<br>");
        for (let i = 1; i <= 10; i++) {
            document.write(i + " ");
        }

        document.write("<br><br>");
        
        document.write("While Loop:<br>");
        var j = 1;
        while (j <= 10) {
            document.write(j + " ");
            j++;
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: yellow;
            padding: 100x;
            text-align: center;
        }
        h2 {
            color: #333;
        }
    </style>
</body>
</html>
