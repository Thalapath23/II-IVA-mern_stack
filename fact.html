<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
</head>
<body>
    <h2>Factorial Finder</h2>
    <label for="num">Enter a number:</label>
    <input type="number" id="num" />
    <button onclick="findFactorial()">Calculate</button>

    <p id="result"></p>

    <script>
        function findFactorial() {
            let n = document.getElementById("num").value;
            n = parseInt(n);

            if (n < 0) {
                document.getElementById("result").innerHTML = "Factorial is not defined for negative numbers.";
                return;
            }

            let fact = 1;
            for (let i = 1; i <= n; i++) {
                fact *= i;
            }

            document.getElementById("result").innerHTML = "Factorial of " + n + " is: " + fact;
        }
    </script>
</body>
</html>
