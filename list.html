<!DOCTYPE html>
<html>
<head>
	<title>Html Lists</title>
</head>
<body>

<h2>Ordered List</h2>
<ol>
	<li>HTML</li>
	<li>CSS</li>
	<li>JavaScript</li>
</ol>
<h2>Unordered List</h2>
<ul>
	<li>Apple</li>
	<li>Mango</li>
	<li>Banana</li>
</ul>
<h2>Names</h2>
<ul>
	<li>Aravind</li>
	<li>teja</li>
	<li>bharath</li>
</ul>
<h2>Definition List</h2>
<dl>
	<dt>HTML</dt>
	<dd>Hyper Text Markup Language</dd>
	<dt>CSS</dt>
	<dd>Cascading Style Sheets</dd>
	<dt>JS</dt>
	<dd>JavaScript</dd>
</dl>
</body>
</html>
